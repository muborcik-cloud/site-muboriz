<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mini Craft</title>

<style>
body {
  margin:0;
  background:#87CEEB;
  font-family:Arial;
  text-align:center;
}

#toolbar {
  background:#333;
  color:white;
  padding:10px;
}

#game {
  display:grid;
  grid-template-columns: repeat(20, 30px);
  justify-content:center;
  margin-top:10px;
}

.cell {
  width:30px;
  height:30px;
  border:1px solid #ccc;
  background:#7CFC00;
}

.grass { background:#7CFC00; }
.dirt { background:#8B4513; }
.wood { background:#A0522D; }
.stone { background:#808080; }

.selected {
  outline:3px solid yellow;
}
</style>
</head>

<body>

<div id="toolbar">
  Выбери блок:
  <button onclick="selectBlock('grass')">Трава</button>
  <button onclick="selectBlock('dirt')">Земля</button>
  <button onclick="selectBlock('wood')">Дерево</button>
  <button onclick="selectBlock('stone')">Камень</button>
  <button onclick="selectBlock('erase')">❌ Удалить</button>
</div>

<div id="game"></div>

<script>
const game = document.getElementById("game");
let selected = "grass";

// создаём поле
for(let i=0;i<400;i++){
  const cell = document.createElement("div");
  cell.className = "cell";

  cell.onclick = () => {
    if(selected === "erase"){
      cell.className = "cell";
    } else {
      cell.className = "cell " + selected;
    }
  };

  game.appendChild(cell);
}

// выбор блока
function selectBlock(type){
  selected = type;
}
</script>

</body>
</html>
